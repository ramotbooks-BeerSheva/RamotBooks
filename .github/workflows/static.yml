steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ... כאן מופיעים הצעדים של בניית האתר (למשל הרצת ה-Script או בניית ה-HTML) ...

      # 1. העלאת ה-Artifact (צריך להופיע רק פעם אחת!)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # או התיקייה שבה נמצאים קבצי ה-HTML המוכנים שלך (למשל '_site' או 'dist')

      # 2. הפריסה עצמה (צריך להופיע רק פעם אחת!)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
